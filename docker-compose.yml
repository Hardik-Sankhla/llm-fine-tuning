version: '3.8'

services:
  llm-fine-tuning:
    build: .
    volumes:
      - ./output:/app/output
      - ./configs:/app/configs
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python main.py --model_name microsoft/DialoGPT-small --dataset_name wikitext