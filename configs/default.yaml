# Configuration for LLM Fine-Tuning

model:
  name: "microsoft/DialoGPT-small"
  use_peft: true
  lora_config:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"

dataset:
  name: "wikitext"
  max_length: 512
  test_size: 0.1

training:
  output_dir: "./output"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-5
  fp16: true
  logging_steps: 10
  save_steps: 500
  evaluation_strategy: "steps"
  eval_steps: 500
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

logging:
  level: "INFO"